<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="WILDFLOWER — A 15-level sky-garden platformer.">
  <meta name="theme-color" content="#060810">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>WILDFLOWER — Sky Garden Adventure</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>
  <div id="stage">
    <div id="game-wrap">
      <canvas id="c" width="1280" height="720"></canvas>
      <div id="load-tip">Loading WILDFLOWER...</div>
    </div>
  </div>
  <div id="overlay"></div>
  <div id="touch-ui" aria-label="Touch controls">
    <div class="touch-cluster">
      <button type="button" class="tbtn" data-act="left" aria-label="Left">◀</button>
      <button type="button" class="tbtn" data-act="right" aria-label="Right">▶</button>
    </div>
    <div class="touch-cluster">
      <button type="button" class="tbtn tbtn-pause" data-act="pause" aria-label="Pause">⏸</button>
      <button type="button" class="tbtn tbtn-action" data-act="action" aria-label="Ability">✦</button>
      <button type="button" class="tbtn" data-act="jump" aria-label="Jump">↑</button>
      <button type="button" class="tbtn tbtn-float" data-act="float" aria-label="Float">FLOAT</button>
    </div>
  </div>
  <div id="rotate-screen">
    <div class="icon">📱</div>
    <h2>Rotate your phone</h2>
    <p>Turn your device sideways (landscape) to play WILDFLOWER.</p>
  </div>
  <script type="module" src="js/main.js?v=4"></script>
</body>
</html>
